<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Quest</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #ffe6f0;
    color: #333;
    text-align: center;
    padding: 50px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #ff6b81;
    color: white;
    transition: transform 0.2s;
  }
  button:hover {
    transform: scale(1.1);
  }
  .hidden { display: none; }
  #hearts {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1000;
  }
  .heart {
    position: absolute;
    font-size: 24px;
    animation: floatUp 3s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
  }
  #finalMessage {
    font-size: 48px;
    color: #ff3d7f;
    margin-top: 50px;
    display: none;
  }
</style>
</head>
<body>

<h1>🎮 Relationship Quest 🎮</h1>
<div id="game">
  <p id="story">Are you ready for the adventure?</p>
  <button id="startBtn">Start</button>
</div>

<div id="finalMessage">💖 YES! 💖</div>
<div id="hearts"></div>

<script>
const story = document.getElementById("story");
const startBtn = document.getElementById("startBtn");
const gameDiv = document.getElementById("game");
const finalMessage = document.getElementById("finalMessage");
const heartsDiv = document.getElementById("hearts");

startBtn.onclick = () => {
  story.textContent = "Level 1: We matched on that app and have been texting since January 2026… Are you ready to take our adventure to the next level?";
  startBtn.style.display = "none";
  showChoices(["Yes", "No"], level2);
};

function showChoices(options, callback) {
  const buttons = options.map(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => callback(opt);
    gameDiv.appendChild(btn);
    return btn;
  });
}

function clearChoices() {
  const buttons = gameDiv.querySelectorAll("button");
  buttons.forEach(b => b.remove());
}

let noCount = 0; // tracks how many times "No" was clicked

function level2(choice) {
  clearChoices();
  if(choice === "Yes") {
    story.textContent = "Level 2: After all our texts and laughs, I have to ask… Will you be my girlfriend?";
    showChoices(["Yes", "No"], finalLevel);
  } else {
    noCount++;
    if(noCount === 1){
      story.textContent = "Are you sure? 😅";
      showChoices(["Yes", "No"], level2); // loop back for confirmation
    } else {
      story.textContent = "Oh no! Looks like we’re not ready yet 😢 — Try again!...Looks like i am stuck in an infinite loop of waiting 😅. I will try again.";
      showChoices(["Restart"], restartGame);
      noCount = 0; // reset for next round
    }
  }
}

function finalLevel(choice) {
  clearChoices();
  if(choice === "Yes") {
    story.textContent = "";
    finalMessage.style.display = "block";
    startHearts();
  } else {
    noCount++;
    if(noCount === 1){
      story.textContent = "Are you sure? 😅";
      showChoices(["Yes", "No"], finalLevel); // confirmation loop
    } else {
      story.textContent = "Hmm… not yet 😅 — Try again!";
      showChoices(["Restart"], restartGame);
      noCount = 0; // reset
    }
  }
}

function finalLevel(choice) {
  clearChoices();
  if(choice === "Yes") {
    story.textContent = "";
    finalMessage.style.display = "block";
    startHearts();
  } else {
    story.textContent = "Hmm… not yet 😅 — Try again!";
    showChoices(["Restart"], restartGame);
  }
}

function restartGame() {
  clearChoices();
  finalMessage.style.display = "none";
  story.textContent = "Are you ready for the adventure?";
  startBtn.style.display = "inline-block";
}

function startHearts() {
  let count = 0;
  const heartInterval = setInterval(() => {
    if(count > 30) { clearInterval(heartInterval); return; }
    createHeart();
    count++;
  }, 100);
}

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.textContent = "❤️";
  heart.style.left = (Math.random() * 100 - 50) + "%";
  heartsDiv.appendChild(heart);
  setTimeout(() => heart.remove(), 3000);
}
</script>

</body>
</html>
