<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relationship Quest</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #ffe6f0;
    color: #333;
    text-align: center;
    padding: 50px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin: 10px;
    cursor: pointer;
    border-radius: 8px;
    border: none;
    background: #ff6b81;
    color: white;
    transition: transform 0.2s;
  }
  button:hover {
    transform: scale(1.1);
  }
  #hearts {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 1000;
  }
  .heart {
    position: absolute;
    font-size: 24px;
    animation: floatUp 3s ease-out forwards;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(1); opacity: 1; }
    100% { transform: translateY(-300px) scale(1.5); opacity: 0; }
  }
  #finalMessage {
    font-size: 48px;
    color: #ff3d7f;
    margin-top: 50px;
    display: none;
  }
  #hint {
    font-size: 20px;
    color: #ff6b81;
    margin-top: 20px;
    opacity: 0;
    transition: opacity 1s ease-in-out;
  }
</style>
</head>
<body>

<h1>🎮 Relationship Quest 🎮</h1>
<div id="game">
  <p id="story">Are you ready for the adventure?</p>
  <button id="startBtn">Start</button>
  <p id="hint"></p>
</div>

<div id="finalMessage">💖 YES! 💖</div>
<div id="hearts"></div>

<script>
const story = document.getElementById("story");
const startBtn = document.getElementById("startBtn");
const gameDiv = document.getElementById("game");
const finalMessage = document.getElementById("finalMessage");
const heartsDiv = document.getElementById("hearts");
const hint = document.getElementById("hint");

let noCount = 0;
let hintTimeout = null;

startBtn.onclick = () => {
  story.textContent = "Level 1: We matched on that app and have been texting since Late 2025… Are you ready to take our adventure to the next level?";
  startBtn.style.display = "none";
  showChoices(["Yes", "No"], level2);
  hideHint();
};

function showChoices(options, callback) {
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = () => callback(opt);
    gameDiv.appendChild(btn);
  });
}

function clearChoices() {
  const buttons = gameDiv.querySelectorAll("button");
  buttons.forEach(b => b.remove());
  hideHint();
}

function hideHint() {
  hint.style.opacity = 0;
  if (hintTimeout) clearTimeout(hintTimeout);
}

// -------- Level 2 --------
function level2(choice) {
  clearChoices();
  if (choice === "Yes") {
    story.textContent = "Level 2: After all our texts and laughs, I have to ask… Will you be my girlfriend?";
    noCount = 0;
    showChoices(["Yes", "No"], finalLevel);
  } else {
    noCount++;
    if (noCount === 1) {
      story.textContent = "Are you sure? 😅 I have a surprise if you say Yes!";
      hint.textContent = "Hint: It’s full of ❤️ and fun! ⚡ P.S. Don’t be a Snorlax—wake up and say Yes! 😉";
      hint.style.opacity = 1;
      hintTimeout = setTimeout(() => hint.style.opacity = 0, 4000);
      showChoices(["Yes", "No"], level2);
    } else {
      story.textContent = "Oh no! 😢 — Like a Pokémon battle, we fainted… but we can try again! 😉";
      showChoices(["🔄 Restart Adventure"], refreshPage);
      noCount = 0;
      hideHint();
    }
  }
}

// -------- Final Level --------
function finalLevel(choice) {
  clearChoices();
  if (choice === "Yes") {
    story.textContent = "";
    finalMessage.style.display = "block";
    startHearts();
  } else {
    story.textContent = "Hmm…I guess we are not there yet 😅 — I will try again next time!";
    showChoices(["🔄 Restart Adventure"], refreshPage);
  }
}

// -------- Refresh --------
function refreshPage() {
  location.reload();
}

// -------- Hearts Animation --------
function startHearts() {
  let count = 0;
  const heartInterval = setInterval(() => {
    if(count > 30) { clearInterval(heartInterval); return; }
    createHeart();
    count++;
  }, 100);
}

function createHeart() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.textContent = "❤️";
  heart.style.left = (Math.random() * 100 - 50) + "%";
  heartsDiv.appendChild(heart);
  setTimeout(() => heart.remove(), 3000);
}
</script>

</body>
</html>
